                  {/* Options List */}
                  <div className="space-y-3 mb-6">
                    {questions[currentIdx].options.map((option, idx) => {
                      const isSelected = selectedOption === option;
                      const isCorrect = option === questions[currentIdx].answer;
                      
                      let btnStyle = "border-slate-200 dark:border-slate-800 hover:border-slate-300 dark:hover:border-slate-700 hover:bg-slate-50 dark:hover:bg-slate-800/50";
                      let indicator = null;

                      if (mode === "practice") {
                        if (isAnswered) {
                          if (isCorrect) {
                            btnStyle = "border-emerald-500 bg-emerald-50 dark:bg-emerald-950/30 text-emerald-900 dark:text-emerald-300 font-semibold ring-2 ring-emerald-500/20";
                            indicator = <i className="fa-solid fa-circle-check text-emerald-500 text-lg"></i>;
                          } else if (isSelected) {
                            btnStyle = "border-rose-400 bg-rose-50 dark:bg-rose-950/30 text-rose-900 dark:text-rose-300 font-semibold ring-2 ring-rose-400/20";
                            indicator = <i className="fa-solid fa-circle-xmark text-rose-500 text-lg"></i>;
                          } else {
                            btnStyle = "border-slate-200 dark:border-slate-800 opacity-60";
                          }
                        } else if (isSelected) {
                          btnStyle = "border-indigo-500 bg-indigo-50/40 dark:bg-indigo-950/10 ring-2 ring-indigo-500/10 text-indigo-800 dark:text-indigo-300 font-semibold";
                        }
                      } else {
                        // Exam Mode
                        if (isSelected) {
                          btnStyle = "border-purple-500 bg-purple-50/40 dark:bg-purple-950/10 ring-2 ring-purple-500/10 text-purple-800 dark:text-purple-300 font-semibold";
                        }
                      }

                      return (
                        <button
                          key={idx}
                          disabled={mode === "practice" && isAnswered}
                          onClick={() => handleOptionSelect(option)}
                          className={`w-full p-4 rounded-xl border text-left transition-all flex items-center justify-between gap-4 ${btnStyle}`}
                        >
                          <div className="flex items-center gap-3">
                            <span className="w-7 h-7 shrink-0 rounded-lg bg-slate-100 dark:bg-slate-800 text-slate-500 dark:text-slate-400 text-xs font-bold flex items-center justify-center uppercase">
                              {String.fromCharCode(65 + idx)}
                            </span>
                            <span className="text-sm font-medium leading-relaxed">{option}</span>
                          </div>
                          {indicator}
                        </button>
                      );
                    })}
                  </div>

                  {/* Practice Feedback Panel */}
                  {mode === "practice" && isAnswered && (
                    <div className="bg-slate-50 dark:bg-slate-800/40 border border-slate-100 dark:border-slate-800 p-5 rounded-xl mb-6 transition-all duration-300">
                      <h4 className="font-bold text-sm text-slate-900 dark:text-slate-200 flex items-center gap-2 mb-2">
                        <i className="fa-solid fa-circle-info text-emerald-500"></i> Why this is correct:
                      </h4>
                      <p className="text-xs text-slate-600 dark:text-slate-350 leading-relaxed">
                        {questions[currentIdx].rationale}
                      </p>
                    </div>
                  )}

                  {/* Navigation Panel */}
                  <div className="flex justify-between items-center border-t border-slate-100 dark:border-slate-800 pt-6">
                    <button
                      onClick={handlePrev}
                      disabled={currentIdx === 0}
                      className="px-4 py-2 text-sm font-semibold rounded-lg bg-slate-100 dark:bg-slate-800 text-slate-700 dark:text-slate-300 disabled:opacity-40 transition-all hover:bg-slate-200 dark:hover:bg-slate-750 flex items-center gap-1.5"
                    >
                      <i className="fa-solid fa-arrow-left"></i> Previous
                    </button>

                    {/* Exit/Back button */}
                    <button 
                      onClick={() => {
                        if (confirm("Are you sure you want to exit? Your progress in this quiz will be lost.")) {
                          setView("welcome");
                        }
                      }}
                      className="text-xs font-semibold text-slate-400 hover:text-rose-500 transition-colors"
                    >
                      Exit Quiz
                    </button>

                    {/* Submit Button for Practice */}
                    {mode === "practice" && !isAnswered ? (
                      <button
                        onClick={handleSubmitAnswer}
                        disabled={!selectedOption}
                        className="px-6 py-2.5 bg-indigo-600 text-white rounded-lg font-semibold hover:bg-indigo-700 disabled:opacity-50 shadow-lg shadow-indigo-500/15 transition-all text-sm flex items-center gap-1.5"
                      >
                        Verify Answer <i className="fa-solid fa-check-double"></i>
                      </button>
                    ) : (
                      <button
                        onClick={handleNext}
                        disabled={!selectedOption && mode === "exam"}
                        className={`px-6 py-2.5 text-white rounded-lg font-semibold shadow-lg transition-all text-sm flex items-center gap-1.5 ${
                          mode === 'exam' 
                            ? 'bg-purple-600 hover:bg-purple-700 shadow-purple-500/15' 
                            : 'bg-indigo-600 hover:bg-indigo-700 shadow-indigo-500/15'
                        }`}
                      >
                        {currentIdx === questions.length - 1 ? "Finish Attempt" : "Next Question"} <i className="fa-solid fa-arrow-right"></i>
                      </button>
                    )}
                  </div>
                </div>
              </div>
            )}

            {/* FLASHCARDS (ESSAY) VIEW */}
            {view === "essay" && (
              <div className="p-6 md:p-8">
                <div className="flex justify-between items-center border-b border-slate-100 dark:border-slate-800 pb-4 mb-6">
                  <div>
                    <h2 className="text-xl font-bold flex items-center gap-2 text-amber-600">
                      <i className="fa-solid fa-layer-group"></i> Essay Flashcards Mode
                    </h2>
                    <p className="text-xs text-slate-500">Memorize deep long-form answers to coursework slide essays.</p>
                  </div>
                  <button 
                    onClick={() => setView("welcome")}
                    className="px-3.5 py-1.5 rounded-lg text-xs bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 font-bold"
                  >
                    Back to Home
                  </button>
                </div>

                <div className="max-w-2xl mx-auto mb-8">
                  <div className="flex justify-between items-center text-xs text-slate-400 font-bold mb-3">
                    <span>Card {flashcardIdx + 1} of {essayQuestionsDatabase.length}</span>
                    <span className="bg-amber-100 text-amber-800 px-2.5 py-0.5 rounded-full">
                      Chapter {essayQuestionsDatabase[flashcardIdx].chapter}
                    </span>
                  </div>

                  {/* The Flip Card */}
                  <div 
                    onClick={() => setRevealFlashcard(!revealFlashcard)}
                    className={`p-8 rounded-2xl border min-h-[250px] flex flex-col justify-between cursor-pointer transition-all duration-300 shadow-md ${
                      revealFlashcard 
                        ? 'border-indigo-500 bg-indigo-50/20 dark:bg-slate-900/40' 
                        : 'border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 hover:border-amber-400'
                    }`}
                  >
                    <div>
                      <span className="block text-[10px] text-slate-400 font-bold uppercase tracking-wider mb-2">Question</span>
                      <p className="text-base md:text-lg font-bold leading-relaxed">
                        {essayQuestionsDatabase[flashcardIdx].question}
                      </p>
                    </div>

                    <div className="mt-6 pt-6 border-t border-dashed border-slate-200 dark:border-slate-800">
                      {revealFlashcard ? (
                        <div>
                          <span className="block text-[10px] text-indigo-500 font-bold uppercase tracking-wider mb-2">Detailed Answer</span>
                          <p className="text-sm font-medium leading-relaxed whitespace-pre-wrap text-slate-700 dark:text-slate-300">
                            {essayQuestionsDatabase[flashcardIdx].answer}
                          </p>
                        </div>
                      ) : (
                        <div className="text-center py-4 text-xs font-bold text-amber-600 flex items-center justify-center gap-1.5 animate-bounce">
                          <i className="fa-solid fa-rotate"></i> Click card to reveal verified answer
                        </div>
                      )}
                    </div>
                  </div>

                  {/* Flashcard navigation */}
                  <div className="flex justify-between items-center mt-6">
                    <button
                      onClick={() => {
                        if (flashcardIdx > 0) {
                          setFlashcardIdx(prev => prev - 1);
                          setRevealFlashcard(false);
                        }
                      }}
                      disabled={flashcardIdx === 0}
                      className="px-4 py-2 text-xs font-bold bg-slate-100 dark:bg-slate-800 rounded-lg disabled:opacity-40"
                    >
                      <i className="fa-solid fa-arrow-left"></i> Previous Card
                    </button>

                    <button
                      onClick={() => setRevealFlashcard(!revealFlashcard)}
                      className="text-xs font-bold px-4 py-2 rounded-lg bg-indigo-100 dark:bg-indigo-950 text-indigo-600 dark:text-indigo-400"
                    >
                      {revealFlashcard ? "Hide Answer" : "Reveal Answer"}
                    </button>

                    <button
                      onClick={() => {
                        if (flashcardIdx < essayQuestionsDatabase.length - 1) {
                          setFlashcardIdx(prev => prev + 1);
                          setRevealFlashcard(false);
                        }
                      }}
                      disabled={flashcardIdx === essayQuestionsDatabase.length - 1}
                      className="px-4 py-2 text-xs font-bold bg-slate-100 dark:bg-slate-800 rounded-lg disabled:opacity-40"
                    >
                      Next Card <i className="fa-solid fa-arrow-right"></i>
                    </button>
                  </div>
                </div>
              </div>
            )}

            {/* RESULTS VIEW */}
            {view === "results" && (
              <div className="p-6 md:p-12 text-center">
                <div className="relative w-28 h-28 mx-auto mb-6 flex items-center justify-center">
                  <svg className="w-full h-full transform -rotate-90">
                    <circle 
                      cx="56" cy="56" r="48" 
                      className="text-slate-100 dark:text-slate-800" 
                      strokeWidth="8" stroke="currentColor" fill="transparent" 
                    />
                    <circle 
                      cx="56" cy="56" r="48" 
                      className={scoreStats.pct >= 60 ? "text-indigo-500" : "text-rose-500"} 
                      strokeWidth="8" strokeDasharray={301.6} 
                      strokeDashoffset={301.6 - (301.6 * scoreStats.pct) / 100} 
                      strokeLinecap="round" stroke="currentColor" fill="transparent" 
                    />
                  </svg>
                  <span className="absolute text-2xl font-black">{scoreStats.pct}%</span>
                </div>

                <h2 className="text-3xl font-extrabold mb-1">
                  {scoreStats.pct >= 85 ? "Excellent Work!" : scoreStats.pct >= 60 ? "Great Attempt!" : "Keep Reviewing!"}
                </h2>
                <p className="text-slate-500 dark:text-slate-400 text-sm mb-6 font-medium">
                  You correctly answered {scoreStats.correct} out of {scoreStats.total} questions.
                </p>

                {mode === "exam" && (
                  <div className="bg-slate-100 dark:bg-slate-800/50 max-w-sm mx-auto p-3.5 rounded-xl border border-slate-200 dark:border-slate-800 text-xs font-semibold mb-8 flex items-center justify-center gap-2">
                    <i className="fa-solid fa-stopwatch text-indigo-500"></i> Total Test Duration: {formatTime(timer)}
                  </div>
                )}

                {/* Navigation Buttons */}
                <div className="flex flex-wrap justify-center gap-4 pt-6 border-t border-slate-100 dark:border-slate-800">
                  <button
                    onClick={() => setView("review")}
                    className="px-5 py-3 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 text-slate-800 dark:text-slate-200 rounded-xl font-bold hover:bg-slate-50 dark:hover:bg-slate-750 transition-all text-sm flex items-center gap-2"
                  >
                    <i className="fa-solid fa-magnifying-glass-chart"></i> Review Explanations
                  </button>
                  <button
                    onClick={() => setView("welcome")}
                    className="px-5 py-3 bg-indigo-600 hover:bg-indigo-700 text-white rounded-xl font-bold transition-all text-sm flex items-center gap-2 shadow-lg shadow-indigo-500/15"
                  >
                    <i className="fa-solid fa-rotate-right"></i> Start Another Session
                  </button>
                </div>
              </div>
            )}

            {/* DETAILED EXPLANATORY REVIEW VIEW */}
            {view === "review" && (
              <div>
                {/* Header panel */}
                <div className="p-6 border-b border-slate-200 dark:border-slate-800 flex justify-between items-center flex-wrap gap-4 bg-slate-50 dark:bg-slate-900/50">
                  <div>
                    <h2 className="text-xl font-bold">Concept Review Checklist</h2>
                    <p className="text-xs text-slate-500 dark:text-slate-400 font-medium">Analyze and verify solutions to build long-term memory.</p>
                  </div>
                  <button 
                    onClick={() => setView("welcome")}
                    className="px-4 py-2 bg-indigo-600 hover:bg-indigo-700 text-white text-xs font-bold rounded-lg transition-all"
                  >
                    <i className="fa-solid fa-house"></i> Back to Home
                  </button>
                </div>

                {/* Review scrollable list */}
                <div className="p-6 space-y-6 max-h-[60vh] overflow-y-auto custom-scrollbar">
                  {questions.map((q, qidx) => {
                    const isCorrect = answers[q.id] === q.answer;
                    return (
                      <div key={q.id} className="p-5 border border-slate-100 dark:border-slate-800 rounded-xl bg-white dark:bg-slate-900/40">
                        <div className="flex items-start justify-between gap-4 mb-3">
                          <span className="text-xs font-bold text-slate-400">Question {qidx + 1}</span>
                          <span className={`text-[10px] font-bold uppercase px-2 py-0.5 rounded ${
                            isCorrect 
                              ? 'bg-emerald-50 dark:bg-emerald-950/30 text-emerald-600' 
                              : 'bg-rose-50 dark:bg-rose-950/30 text-rose-600'
                          }`}>
                            {isCorrect ? "Correct" : "Incorrect / Blank"}
                          </span>
                        </div>

                        <p className="font-bold text-sm mb-4">{q.question}</p>

                        <div className="grid md:grid-cols-2 gap-3 mb-4">
                          <div className="p-3 bg-rose-50/30 dark:bg-rose-950/10 border border-rose-100/50 dark:border-rose-900/30 rounded-lg">
                            <span className="block text-[10px] text-rose-500 font-bold uppercase mb-1">Your Selection</span>
                            <span className="text-xs text-slate-700 dark:text-slate-300 font-semibold">{answers[q.id] || "No Answer / Skipped"}</span>
                          </div>

                          <div className="p-3 bg-emerald-50/30 dark:bg-emerald-950/10 border border-emerald-100/50 dark:border-emerald-900/30 rounded-lg">
                            <span className="block text-[10px] text-emerald-500 font-bold uppercase mb-1">Correct Solution</span>
                            <span className="text-xs text-slate-700 dark:text-slate-300 font-semibold">{q.answer}</span>
                          </div>
                        </div>

                        {/* Rationale */}
                        <div className="p-4 bg-slate-50 dark:bg-slate-800/20 border border-slate-100 dark:border-slate-800 rounded-lg text-xs">
                          <div className="font-bold text-slate-900 dark:text-slate-300 mb-1 flex items-center gap-1.5">
                            <i className="fa-solid fa-circle-info text-indigo-500"></i> Explanation:
                          </div>
                          <p className="text-slate-600 dark:text-slate-400 leading-relaxed">{q.rationale}</p>
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>
            )}

          </main>

          {/* Footer Info */}
          <footer className="text-center text-xs text-slate-400 dark:text-slate-600 mt-8 space-y-1">
            <p className="font-semibold">Professional Ethics Course Companion — Chapters 3, 4, 5, & 6.</p>
            <p>Designed to help you master concepts of loyalty, independence threats, and moral views.</p>
          </footer>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
